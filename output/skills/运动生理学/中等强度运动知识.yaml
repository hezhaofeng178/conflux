skill:
  id: skill_6154b47f
  name: 中等强度运动知识
  version: 1.0.0
  source:
    book: 运动生理学
    chapter: 运动与血压
    document_id: c5d4ae30-19c5-40ad-8c21-ee1a2f8bd5cc
  description: 提供中等强度运动的定义、降压效果及注意事项，用于运动处方或健康建议场景。
  knowledge:
    facts:
    - 中等强度运动指心率达到最大心率的64%-76%或自觉疲劳程度中等。
    - 每周150分钟中等强度运动可降低收缩压5-8 mmHg。
    - 运动后存在'运动后低血压'现象，可持续数小时。
    procedures:
    - trigger: 当用户询问运动对血压的影响或需要制定运动计划时
      steps:
      - 计算用户的最大心率（220-年龄），确定64%-76%的目标心率区间。
      - 建议每周进行至少150分钟的中等强度有氧运动，如快走、慢跑、游泳。
      - 告知运动后可能出现暂时性血压下降，属正常现象。
    caveats:
    - 收缩压>180 mmHg或舒张压>110 mmHg时应避免剧烈运动。
  tags:
  - 运动生理学
  - 高血压
  - 有氧运动
  - 血压管理
  related_skills: []
