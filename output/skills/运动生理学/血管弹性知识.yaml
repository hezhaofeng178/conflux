skill:
  id: skill_a8422a2d
  name: 血管弹性知识
  version: 1.0.0
  source:
    book: 运动生理学
    chapter: 运动与血压
    document_id: c5d4ae30-19c5-40ad-8c21-ee1a2f8bd5cc
  description: 基于运动生理学知识，提供改善血管弹性、降低血压的运动建议，适用于高血压患者或运动处方制定。
  knowledge:
    facts:
    - 血管弹性指血管壁扩张后恢复原状的能力，改善血管弹性可降低外周阻力。
    - 每周150分钟中等强度有氧运动可降低收缩压5-8 mmHg。
    - 运动后存在'运动后低血压'现象，可持续数小时。
    procedures:
    - trigger: 用户询问如何通过运动改善血管弹性或降低血压
      steps:
      - 评估用户当前血压水平，确认收缩压≤180 mmHg且舒张压≤110 mmHg。
      - 推荐每周至少150分钟中等强度有氧运动（如快走、慢跑、游泳）。
      - 建议运动后监测血压，利用运动后低血压效应。
    caveats:
    - 收缩压>180 mmHg或舒张压>110 mmHg时应避免剧烈运动。
    - 运动前需进行医学评估，尤其对于未控制的高血压患者。
  tags:
  - 运动生理学
