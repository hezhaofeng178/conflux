skill:
  id: skill_d256a953
  name: 心输出量知识
  version: 1.0.0
  source:
    book: 运动生理学
    chapter: 运动时的心血管反应
    document_id: c5d4ae30-19c5-40ad-8c21-ee1a2f8bd5cc
  description: 心输出量指心脏每分钟泵出的血量，等于心率乘以每搏输出量，是衡量心脏泵血功能的关键指标。
  knowledge:
    facts:
    - 心输出量 = 心率 × 每搏输出量
    - 运动时心输出量最大可达安静时的4-6倍
    - 优秀运动员运动时心输出量可达30-40升/分
    procedures: []
    caveats:
    - 每搏输出量难以直接测量，通常需要专业设备
    - 心输出量受心率、前负荷、后负荷及心肌收缩力共同影响
    - 不同体位或病理状态可能影响测量准确性
  tags:
  - 运动生理学
  - 心输出量
  - 心血管
  - 心脏泵血
  related_skills: []
