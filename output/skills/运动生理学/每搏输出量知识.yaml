skill:
  id: skill_6e80696a
  name: 每搏输出量知识
  version: 1.0.0
  source:
    book: 运动生理学
    chapter: 运动时的心血管反应
    document_id: c5d4ae30-19c5-40ad-8c21-ee1a2f8bd5cc
  description: 心脏每次搏动泵出的血量，是心输出量的关键组成部分，运动时增加以适应需氧量，直接影响最大摄氧量。
  knowledge:
    facts:
    - 每搏输出量是心输出量（心率×每搏输出量）的组成部分之一
    - 普通成人静息时每搏输出量约60-80ml，精英运动员可达100-120ml
    - 每搏输出量受前负荷、后负荷和心肌收缩力的影响
    procedures: []
    caveats:
    - 每搏输出量随运动强度增加而增加，但达到一定强度后不再显著增加
    - 脱水或高温环境可降低前负荷，从而减少每搏输出量
  tags:
  - 运动生理学
  - 心血管
  - 心输出量
  related_skills: []
