skill:
  id: skill_e23cc3c3
  name: 肌肉利用氧气的能力知识
  version: 1.0.0
  source:
    book: 运动生理学
    chapter: 最大摄氧量
    document_id: c5d4ae30-19c5-40ad-8c21-ee1a2f8bd5cc
  description: 评估肌肉从血液中提取和利用氧气的能力，用于分析最大摄氧量的限制因素及制定耐力训练计划。
  knowledge:
    facts:
    - 肌肉利用氧气的能力是决定最大摄氧量的三大因素之一，仅次于心输出量。
    - 该能力受毛细血管密度、线粒体数量和氧化酶活性影响。
    - 耐力训练可提高肌肉利用氧气的能力，从而提升VO₂max。
    procedures:
    - trigger: 当需要分析运动员VO₂max限制因素或设计提升耐力的训练方案时
      steps:
      - 测量或获取运动员的VO₂max值及心输出量数据
      - 若VO₂max低于预期且心输出量正常，则推断肌肉利用氧气能力不足
      - 建议进行高强度间歇训练或耐力训练以增强肌肉氧化能力
    caveats:
    - 肌肉利用氧气能力通常不是VO₂max的首要限制因素，除非心输出量已优化。
    - 该能力的提升需要较长时间（数周至数月）的持续训练。
  tags:
  - 运动生理学
  - 最大摄氧量
  - 耐力训练
