skill:
  id: skill_384a577c
  name: 运动强度知识
  version: 1.0.0
  source:
    book: 运动生理学
    chapter: 运动与心力衰竭
    document_id: c5d4ae30-19c5-40ad-8c21-ee1a2f8bd5cc
  description: 评估和指导运动强度，特别是针对心力衰竭患者的有氧运动，以改善心功能并提高VO₂max。
  knowledge:
    facts:
    - 适当的有氧运动（如步行、骑车）可以改善心衰患者的心功能
    - 运动训练可提高心衰患者的VO₂max 10-30%
    - 心衰患者运动需在医疗监护下进行，强度应循序渐进
    procedures:
    - trigger: 当需要为心力衰竭患者制定或调整运动计划时
      steps:
      - 评估患者当前心功能状态和运动耐受能力
      - 选择低至中等强度的有氧运动（如步行、骑车）
      - 在医疗监护下开始运动，初始强度宜低，逐步增加
      - 监测运动期间心率、血压及症状，确保安全
    caveats:
    - 运动强度必须循序渐进，避免突然增加
    - 所有运动应在医疗监护下进行，尤其是心衰患者
    - 注意个体差异，根据患者反应调整强度
  tags:
