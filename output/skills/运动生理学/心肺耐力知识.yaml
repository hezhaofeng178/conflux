  name: 心肺耐力知识
  version: 1.0.0
  source:
    book: 运动生理学
    chapter: 最大摄氧量
    document_id: c5d4ae30-19c5-40ad-8c21-ee1a2f8bd5cc
  description: 评估和解释心肺耐力，以最大摄氧量（VO₂max）为核心指标，适用于运动生理学、健康评估和训练设计。
  knowledge:
    facts:
    - 最大摄氧量（VO₂max）是心肺耐力的金标准指标，反映极限运动时心血管系统向组织输送氧气的最大能力。
    - VO₂max 主要取决于心输出量（心率×每搏输出量），其次是肺部气体交换效率和肌肉利用氧气的能力。
    - 普通成人 VO₂max 约 35-45 ml/kg/min，精英耐力运动员可达 70-85 ml/kg/min。
    procedures:
    - trigger: 当需要评估或解释个体的心肺耐力水平时
      steps:
      - 获取或估算个体的 VO₂max 值（如通过运动测试或公式）。
      - 将 VO₂max 值与年龄、性别匹配的常模比较，判断心肺耐力等级。
      - 根据 VO₂max 值提供训练建议（如提高心输出量或肌肉氧利用效率）。
    caveats:
    - VO₂max 受遗传、年龄、性别和训练状态影响，单次测量可能不反映真实变化。
    - 直接测量需专业设备，间接估算可能存在误差。
