skill:
  id: skill_4debef0a
  name: 医疗监护知识
  version: 1.0.0
  source:
    book: 运动生理学
    chapter: 运动与心力衰竭
    document_id: c5d4ae30-19c5-40ad-8c21-ee1a2f8bd5cc
  description: 在专业医疗人员指导下，为心力衰竭患者设计并实施安全、渐进的有氧运动方案，以改善心功能并提高VO₂max。
  knowledge:
    facts:
    - 适当的有氧运动（如步行、骑车）可改善心衰患者的心功能
    - 运动训练可提高心衰患者的VO₂max 10-30%
    - 运动需在医疗监护下进行，强度应循序渐进
    procedures:
    - trigger: 当需要为心力衰竭患者制定运动计划时
      steps:
      - 评估患者当前心功能和运动能力
      - 在医疗监护下开始低强度有氧运动（如步行）
      - 根据患者反应逐步增加运动强度和时间
    caveats:
    - 必须在专业医疗人员指导下进行
    - 运动强度需循序渐进，避免过度负荷
    - 不适用于急性心衰或不稳定期患者
