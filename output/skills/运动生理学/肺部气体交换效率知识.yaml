skill:
  id: skill_e8ee3473
  name: 肺部气体交换效率知识
  version: 1.0.0
  source:
    book: 运动生理学
    chapter: 最大摄氧量
    document_id: c5d4ae30-19c5-40ad-8c21-ee1a2f8bd5cc
  description: 评估肺部气体交换效率对最大摄氧量的影响，用于分析运动表现和心肺功能。
  knowledge:
    facts:
    - 肺部气体交换效率是影响最大摄氧量的三个主要因素之一。
    - 最大摄氧量是衡量心肺耐力的金标准指标。
    - 普通成人最大摄氧量约35-45 ml/kg/min，精英耐力运动员可达70-85 ml/kg/min。
    procedures:
    - trigger: 当需要分析运动员或个体的最大摄氧量限制因素时
      steps:
      - 测量或获取个体的最大摄氧量数据。
      - 评估心输出量和肌肉利用氧气能力，排除其他因素后，推断肺部气体交换效率的影响。
    caveats:
    - 肺部气体交换效率通常不是最大摄氧量的主要限制因素，心输出量更为关键。
  tags:
  - 运动生理学
  - 最大摄氧量
  - 心肺耐力
  related_skills: []
