  name: 气体交换知识
  version: 1.0.0
  source:
    book: 呼吸系统
    chapter: 呼吸的基本过程
    document_id: e446c79c-5d43-43f6-a9f8-92f01304967a
  description: 吸入氧气排出二氧化碳的过程，包括外呼吸和内呼吸两个阶段。与心血管系统密切配合，受心输出量和心功能影响。
  knowledge:
    facts:
    - 气体交换是呼吸系统的主要功能。
    - 外呼吸：在肺部进行，肺泡与肺毛细血管之间的气体交换。
    - 内呼吸：在组织细胞中进行，血液与组织细胞之间的气体交换。
    - 呼吸系统和心血管系统密切配合：肺循环由右心室泵血到肺动脉，经过肺泡进行气体交换后，含氧血液经肺静脉回到左心房。
    - 当心输出量下降时，肺部灌注不足，会导致气体交换效率降低。
    - 心力衰竭可导致肺水肿：左心衰时血液在肺部淤积，液体渗入肺泡，严重影响呼吸功能。
    procedures: []
    caveats:
    - 气体交换效率受心输出量影响，心输出量下降时效率降低。
    - 左心衰竭可导致肺水肿，严重影响气体交换。
