skill:
  id: skill_c3062226
  name: 每分通气量知识
  version: 1.0.0
  source:
    book: 呼吸系统
    chapter: 呼吸的基本过程
    document_id: e446c79c-5d43-43f6-a9f8-92f01304967a
  description: 潮气量乘以呼吸频率，正常约6-10升/分（呼吸频率12-20次/分），反映每分钟通入肺的气体总量。
  knowledge:
    facts:
    - 每分通气量（Minute Ventilation, MV）= 潮气量（TV）× 呼吸频率（RR）。
    - 正常成人平静时呼吸频率12-20次/分，潮气量约500 mL，故每分通气量约6-10 L/min。
    - 是评估肺通气效率的基础指标。
    procedures: []
    caveats:
    - 每分通气量受呼吸频率和潮气量双重影响，需同时分析二者。
    - 仅反映总通气量，不反映肺泡通气量（需减去死腔通气），可能低估肺换气效率。
    - 参考值需考虑年龄、性别、体表面积及活动状态。
  tags:
  - 呼吸系统
  - 肺功能
  - 每分通气量
  related_skills: []
