skill:
  id: skill_98419789
  name: 环境氧浓度知识
  version: 1.0.0
  source:
    book: 呼吸系统
    chapter: 呼吸的基本过程
    document_id: e446c79c-5d43-43f6-a9f8-92f01304967a
  description: 评估环境氧浓度（空气氧比例）对血氧饱和度的影响，用于解释低氧血症或高原适应问题。
  knowledge:
    facts:
    - 海平面环境氧浓度约为21%。
    - 海拔每升高1000米，氧浓度下降约1.5%。
    - 血氧饱和度低于90%提示低氧血症，需考虑环境氧浓度因素。
    - 高海拔环境下，即使肺功能正常，血氧饱和度也可能偏低。
    procedures:
    - trigger: 用户报告血氧饱和度低于正常（<95%）或处于高海拔地区。
      steps:
      - 确认用户当前海拔高度或环境氧浓度数据。
      - 根据海拔计算预期氧浓度（使用标准递减率）。
      - 结合用户血氧值，判断是否由环境氧浓度降低导致。
    caveats:
    - 环境氧浓度仅为影响因素之一，需排除肺、心、血红蛋白等其他病理因素。
    - 个体对低氧的适应能力不同，高海拔居民可能耐受更低血氧值。
    - 测量血氧饱和度时，设备可能受低温、运动等干扰。
  tags:
  - 环境
  - 氧浓度
  - 血氧饱和度
  - 高海拔
  - 呼吸
  related_skills: []
