skill:
  id: skill_988d6ee1
  name: 心脏瓣膜疾病知识
  version: 1.0.0
  source:
    book: 心血管系统
    chapter: 心脏的基本功能
    document_id: 0ff42484-71f5-4ac3-a56b-d4c08456d736
  description: 识别心脏瓣膜疾病作为心力衰竭潜在原因的知识，辅助诊断与评估。
  knowledge:
    facts:
    - 心脏瓣膜疾病是心脏瓣膜功能异常导致的疾病。
    - 心脏瓣膜疾病是心力衰竭的常见原因之一。
    - 心力衰竭的症状包括呼吸困难、水肿和疲劳。
    procedures:
    - trigger: 当患者表现出心力衰竭症状（如呼吸困难、水肿、疲劳）且无明确冠心病或高血压病史时。
      steps:
      - 询问患者是否有心脏瓣膜疾病史或相关症状（如心悸、胸痛）。
      - 安排心脏超声检查以评估瓣膜功能。
    caveats:
    - 心脏瓣膜疾病可能与其他心力衰竭原因共存，需综合评估。
    - 单凭症状无法确诊，需依赖影像学检查。
