    chapter: 心脏的基本功能
    document_id: 0ff42484-71f5-4ac3-a56b-d4c08456d736
  description: 构成心脏壁的肌肉组织，通过节律性收缩产生泵血动力。
  knowledge:
    facts:
    - 属于横纹肌，但不随意收缩。
    - 具有自律性，能自主发电冲动。
    - 心肌细胞间通过闰盘连接，形成合胞体。
    procedures: []
    caveats:
    - 心肌受损后再生能力极弱。
    - 不同部位心肌（心房、心室）功能有差异。
