skill:
  id: skill_8db134a8
  name: 主动脉知识
  version: 1.0.0
  source:
    book: 心血管系统
    chapter: 心脏的基本功能
    document_id: 0ff42484-71f5-4ac3-a56b-d4c08456d736
  description: 将富含氧气的血液从左心室输送到全身的最大动脉，构成体循环的起始部分。
  knowledge:
    facts:
    - 主动脉起源于左心室，分为升主动脉、主动脉弓和降主动脉（胸主动脉和腹主动脉）。
    - 主动脉壁含有丰富的弹性纤维，能缓冲心脏射血时的压力波动，维持连续血流。
    procedures: []
    caveats:
    - 主动脉夹层是急重症，表现为撕裂样胸痛，需要紧急处理。
    - 主动脉瘤（尤其是腹主动脉瘤）在破裂前常无症状，筛查风险人群有助于预防。
  tags:
  - 心血管系统
  - 血管解剖
  - 主动脉
