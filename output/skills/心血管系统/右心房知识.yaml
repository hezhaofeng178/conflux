  name: 右心房知识
  version: 1.0.0
  source:
    book: 心血管系统
    chapter: 心脏的基本功能
    document_id: 0ff42484-71f5-4ac3-a56b-d4c08456d736
  description: 心脏的四个腔室之一，位于右上部，接收全身回流的缺氧血液并将其泵入右心室。
  knowledge:
    facts:
    - 右心房是心脏四腔之一，位于右上部，负责接收从上腔静脉、下腔静脉和冠状窦回流的缺氧血液。
    - 右心房通过三尖瓣与右心室相连，在收缩期将血液推入右心室。
    procedures: []
    caveats:
    - 右心房与左心房之间有心房隔分隔，在出生后若未完全闭合则形成房间隔缺损。
    - 右心房的血液是缺氧的，但并非完全无氧，氧饱和度约70%左右。
  tags:
  - 心血管系统
  - 心脏解剖
  - 右心房
